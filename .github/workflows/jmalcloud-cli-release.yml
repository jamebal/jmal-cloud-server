name: Build jmalcloud CLI

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli/jmal-cloud-cli

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --manifest-path cli/jmal-cloud-cli/Cargo.toml --release --target ${{ matrix.target }}
          else
            cargo build --manifest-path cli/jmal-cloud-cli/Cargo.toml --release --target ${{ matrix.target }}
          fi

      - name: Archive
        run: |
          mkdir -p dist
          cp "cli/jmal-cloud-cli/target/${{ matrix.target }}/release/jmalcloud" dist/jmalcloud
          tar -czf "jmalcloud-${{ matrix.target }}.tar.gz" -C dist jmalcloud

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jmalcloud-${{ matrix.target }}
          path: jmalcloud-${{ matrix.target }}.tar.gz

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: jmalcloud-${{ matrix.target }}.tar.gz

      - name: Upload installer artifact
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: jmalcloud-install-script
          path: cli/jmal-cloud-cli/install.sh

      - name: Upload installer release asset
        if: github.event_name == 'release' && matrix.target == 'x86_64-unknown-linux-gnu'
        uses: softprops/action-gh-release@v2
        with:
          files: cli/jmal-cloud-cli/install.sh
